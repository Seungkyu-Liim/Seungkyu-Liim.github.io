<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sheets Sync OAuth Redirect</title>
  <style>
    body { margin:0; background:#1a1a2e; color:#eaeaea; font-family:system-ui,sans-serif; }
    .wrap { max-width:780px; margin:40px auto; padding:20px; }
    .card { background:#16213e; border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:16px; }
    h1 { margin:0 0 10px; font-size:20px; }
    p { color:#b5bdd6; line-height:1.6; margin:8px 0; }
    .code { background:#0f3460; border-radius:8px; padding:10px; word-break:break-all; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; }
    .btn { margin-top:10px; padding:8px 12px; border:none; border-radius:8px; cursor:pointer; background:#4cc9f0; color:#062238; font-weight:700; }
    .err { color:#f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Google 로그인 완료</h1>
      <p>아래 <b>Authorization Code</b>를 복사해서 피그마 플러그인에 붙여넣어 주세요.</p>
      <div id="error" class="err"></div>
      <div id="codeBox" class="code"></div>
      <button id="copyBtn" class="btn" type="button">코드 복사</button>
      <p>복사 후 플러그인에서 <b>코드로 로그인 완료</b> 버튼을 누르면 됩니다.</p>
    </div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');
      const errEl = document.getElementById('error');
      const codeBox = document.getElementById('codeBox');
      const copyBtn = document.getElementById('copyBtn');

      if (error) {
        errEl.textContent = 'OAuth 오류: ' + error;
        codeBox.textContent = '';
        copyBtn.style.display = 'none';
        return;
      }
      if (!code) {
        errEl.textContent = 'Authorization code를 받지 못했습니다.';
        codeBox.textContent = '';
        copyBtn.style.display = 'none';
        return;
      }

      codeBox.textContent = code;

      if (window.opener) {
        window.opener.postMessage({ type: 'oauth_callback', code, state }, '*');
      }

      copyBtn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(code);
          copyBtn.textContent = '복사됨';
          setTimeout(() => { copyBtn.textContent = '코드 복사'; }, 1200);
        } catch (e) {
          copyBtn.textContent = '복사 실패';
        }
      });
    })();
  </script>
</body>
</html>
