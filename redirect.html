<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sheets Sync — 로그인 중</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      color: #eaeaea;
    }
    .box {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #4cc9f0;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    p  { font-size: 13px; color: #a0a0b8; }
    .error { color: #f87171; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">로그인 처리 중...</h2>
  <p id="subtitle">피그마로 돌아가는 중입니다. 잠시 기다려주세요.</p>
</div>

<script>
  (function () {
    const params = new URLSearchParams(location.search);
    const code  = params.get('code');
    const state = params.get('state');
    const error = params.get('error');

    if (error) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('title').textContent = '로그인 취소됨';
      document.getElementById('subtitle').className = 'error';
      document.getElementById('subtitle').textContent = error;
      return;
    }

    if (!code) {
      document.getElementById('title').textContent = '오류 발생';
      document.getElementById('subtitle').className = 'error';
      document.getElementById('subtitle').textContent = 'Authorization code를 받지 못했습니다.';
      return;
    }

    // 피그마 플러그인 UI(부모 창)로 code 전달
    if (window.opener) {
      window.opener.postMessage({ type: 'oauth_callback', code, state }, '*');
      setTimeout(() => window.close(), 800);
    } else {
      // opener가 없는 경우 (redirect 방식)
      document.getElementById('title').textContent = '창을 닫아주세요';
      document.getElementById('subtitle').textContent = '피그마로 돌아가서 계속 진행해주세요.';
    }
  })();
</script>
</body>
</html>
